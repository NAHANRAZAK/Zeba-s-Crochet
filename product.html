<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">

        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="logo2.jpeg" alt="Logo" width="50" height="40" class="d-inline-block align-text-top">
              </a>
             <a class="navbar-brand" href="index.html">Zeba's Crochet</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">

    <!-- Products -->

<div class="container mt-4">
    <h2>Products</h2>
    <div class="row" id="productContainer"></div>
  </div>
  
  <script>
  
  
  async function fetchProducts() {
    try {
      const res = await fetch("https://fakestoreapi.com/products");
      const data = await res.json();
  
      const container = document.getElementById("productContainer");
          
      data.forEach(product => {
        container.innerHTML += `
          <div class="col-md-3 mb-4">
            <div class="card h-100">
              <img src="${product.image}" class="card-img-top" style="height:200px; object-fit:contain;">
              <div class="card-body">
                <h6>${product.title}</h6>
                <p>$${product.price}</p>
              </div>
            </div>
          </div>
        `;
      });
  
    } catch (error) {
      console.log("Error:", error);
    }
  }
  
  fetchProducts();
  
  
  </script>
</body>
</html>
